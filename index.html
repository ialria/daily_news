<!doctype html>
<html lang="en">
    <head>
        <title>Title</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom right, #f8fafc, #eef2f7);
        }

        h1 {
            font-weight: 600;
            color: #1f2937;
            letter-spacing: -0.5px;
        }

        h2 {
            color: #6b7280;
            font-weight: 500;
        }

        #newsLoader {
            display: none;
            justify-content: center;
            padding: 50px;
        }

        .loader {
            width: 45px;
            height: 45px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .news-card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .news-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .news-card img {
            height: 180px;
            width: 100%;
            object-fit: cover;
            filter: brightness(0.95);
            transition: 0.3s;
        }

        .news-card:hover img {
            filter: brightness(1);
        }

        .news-content {
            padding: 16px;
        }

        .news-title {
            font-size: 15px;
            font-weight: 500;
            color: #111827;
            line-height: 1.4;
            margin-bottom: 8px;
            transition: 0.2s;
        }

        .news-title:hover {
            color: #6366f1;
        }

        .news-date {
            font-size: 12px;
            color: #9ca3af;
        }

        .app-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .app-title span {
            color: #6366f1;
        }

    </style>
    </head>

    <body>
      
        <main>
            <div class="container">
                <h1 class="fs-3 fw-bold text-center py-3">News Blog</h1>
                <h2 class="fs-3">Pakistani News</h2>
                <div id="newsLoader">
                    <span class="loader"></span>
                </div>
                <div class="row gy-3" id="newsContainer">
                   
                    
                </div>
            </div>
        </main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Libraries -->
        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>
        <script>

let newsLoader=document.getElementById("newsLoader");

async function fetchNewsData() {
    newsLoader.style.display='flex';
let response=await fetch("https://androidstudent.com/apis/thenews/pakistani.php");
let newsArray=await response.json();
newsLoader.style.display='none';
let fullNews='';
for (let newsItem of newsArray)
{
    let newsItemDiv=`<div class="col-lg-3 col-md-4 col-sm-6">
        <a href="${newsItem.link}" target="_blank">
<img src="${newsItem.image}" class="img-fluid" alt="">
</a>
<a href="${newsItem.link}" class="text-decoration-none text-black" target="_blank">
<h3 class="fs-5 py-2 mb-0">${newsItem.title}</h3>
</a>
<p>${newsItem.publishDate}</p>
                    </div>`;

                    fullNews+=newsItemDiv;
}

let newsWrapper=document.getElementById("newsContainer");
newsWrapper.innerHTML=fullNews;
// console.log(newsWrapper);
}


fetchNewsData();

        </script>
    </body>
</html>
